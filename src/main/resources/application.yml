spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: pgcore

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
logging:
  pattern:
    level: "%5p [traceId:%X{traceId} messageId:%X{messageId} eventId:%X{eventId}]"

webhook:
  auth:
    enabled: ${WEBHOOK_AUTH_ENABLED}
    merchant-tokens: ${WEBHOOK_AUTH_MERCHANT_TOKENS}
  dispatcher:
    batch-size: ${DISPATCHER_BATCH_SIZE}
    interval-ms: ${DISPATCHER_INTERVAL_MS}
  secret:
    # AES-256-GCM key: base64(32 bytes). 반드시 WEBHOOK_SECRET_KEY 환경변수로 주입해야 함. 미설정 시 기동 실패.
    encryption-key: ${WEBHOOK_SECRET_KEY}
  endpoint:
    # 실서비스는 반드시 true. HTTP 허용이 필요한 경우(로컬 테스트)에만 false로 변경.
    require-https: ${WEBHOOK_REQUIRE_HTTPS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha

outbox:
  relay:
    enabled: ${OUTBOX_RELAY_ENABLED}
    publisher: ${OUTBOX_RELAY_PUBLISHER}
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE}
    interval-ms: ${OUTBOX_RELAY_INTERVAL_MS}
    lease-minutes: ${OUTBOX_RELAY_LEASE_MINUTES}
    lease-sweep-interval-ms: ${OUTBOX_RELAY_LEASE_SWEEP_INTERVAL_MS}
    max-retry: ${MAX_RETRY_WEBHOOK}
    sqs:
      queue-url: ${OUTBOX_RELAY_SQS_QUEUE_URL}

mock-card-server:
  url: ${MOCK_CARD_SERVER_URL}

payment:
  reconciliation:
    unknown:
      enabled: ${PAYMENT_RECON_UNKNOWN_ENABLED}
      interval-ms: ${PAYMENT_RECON_UNKNOWN_INTERVAL_MS}
      batch-size: ${PAYMENT_RECON_UNKNOWN_BATCH_SIZE}
      lease-seconds: ${PAYMENT_RECON_UNKNOWN_LEASE_SECONDS}
      max-retry-attempts: ${PAYMENT_RECON_UNKNOWN_MAX_RETRY_ATTEMPTS}
aws:
  region: ${AWS_REGION}
