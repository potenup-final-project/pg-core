
LOG_SERVICE_NAME: ${LOG_SERVICE_NAME}
pgcore:
  logging:
    legacy:
      enabled: ${PGCORE_LEGACY_LOGGING_ENABLED}

spring:
  main:
    banner-mode: ${SPRING_BANNER_MODE}
  web:
    resources:
      add-mappings: false
    mvc:
      throw-exception-if-no-handler-found: true
  config:
    import: optional:file:.env[.properties]
  datasource:
    name: pg-core
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX}
      minimum-idle: ${DB_POOL_MIN}
      connection-timeout: ${DB_CONN_TIMEOUT_MS}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS}
      max-lifetime: ${DB_MAX_LIFETIME_MS}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DB_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  jackson:
    default-property-inclusion: non_null

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  health:
    circuitbreakers:
      enabled: ${CB_HEALTH_ENABLED:true}

  prometheus:
    metrics:
      export:
        enabled: true

  metrics:
    tags:
      application: pg-core
      env: prod
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
      slo:
        http.server.requests: 100ms, 300ms, 500ms, 1s, 3s

logging:
  pattern:
    level: "%5p [traceId:%X{traceId} messageId:%X{messageId} eventId:%X{eventId}]"
  level:
    root: ${APP_ROOT_LOG_LEVEL}
    com.gop.logging.core.StructuredLoggerImpl: ${LOG_MIN_LEVEL}
  technical:
    slow-threshold-ms: ${LOGGING_SLOW_THRESHOLD_MS}

webhook:
  auth:
    enabled: ${WEBHOOK_AUTH_ENABLED}
    merchant-tokens: ${WEBHOOK_AUTH_MERCHANT_TOKENS}
  dispatcher:
    batch-size: ${DISPATCHER_BATCH_SIZE}
    interval-ms: ${DISPATCHER_INTERVAL_MS}
  secret:
    # AES-256-GCM key: base64(32 bytes). 반드시 WEBHOOK_SECRET_KEY 환경변수로 주입해야 함. 미설정 시 기동 실패.
    encryption-key: ${WEBHOOK_SECRET_KEY}
  endpoint:
    # 실서비스는 반드시 true. HTTP 허용이 필요한 경우(로컬 테스트)에만 false로 변경.
    require-https: ${WEBHOOK_REQUIRE_HTTPS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha

outbox:
  relay:
    enabled: ${OUTBOX_RELAY_ENABLED}
    publisher: ${OUTBOX_RELAY_PUBLISHER}
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE}
    interval-ms: ${OUTBOX_RELAY_INTERVAL_MS}
    lease-minutes: ${OUTBOX_RELAY_LEASE_MINUTES}
    lease-sweep-interval-ms: ${OUTBOX_RELAY_LEASE_SWEEP_INTERVAL_MS}
    max-retry: ${MAX_RETRY_WEBHOOK}
    sqs:
      webhook-queue-url: ${OUTBOX_RELAY_SQS_WEBHOOK_QUEUE_URL}
      settlement-queue-url: ${OUTBOX_RELAY_SQS_SETTLEMENT_QUEUE_URL}

mock-card-server:
  url: ${MOCK_CARD_SERVER_URL}

payment:
  http:
    connect-timeout-ms: 2000
    read-timeout-ms: 5000
    connection-request-timeout-ms: 1000
    max-connections-total: 500
    max-connections-per-route: 100
  approval:
    metrics:
      pg: mock-card
  reconciliation:
    unknown:
      enabled: ${PAYMENT_RECON_UNKNOWN_ENABLED}
      interval-ms: ${PAYMENT_RECON_UNKNOWN_INTERVAL_MS}
      batch-size: ${PAYMENT_RECON_UNKNOWN_BATCH_SIZE}
      lease-seconds: ${PAYMENT_RECON_UNKNOWN_LEASE_SECONDS}
      max-retry-attempts: ${PAYMENT_RECON_UNKNOWN_MAX_RETRY_ATTEMPTS}

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: ${CB_DEFAULT_REGISTER_HEALTH_INDICATOR:true}
        sliding-window-type: ${CB_DEFAULT_SLIDING_WINDOW_TYPE:COUNT_BASED}
        sliding-window-size: ${CB_DEFAULT_SLIDING_WINDOW_SIZE:20}
        minimum-number-of-calls: ${CB_DEFAULT_MINIMUM_NUMBER_OF_CALLS:10}
        failure-rate-threshold: ${CB_DEFAULT_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${CB_DEFAULT_SLOW_CALL_RATE_THRESHOLD:80}
        slow-call-duration-threshold: ${CB_DEFAULT_SLOW_CALL_DURATION_THRESHOLD:2s}
        wait-duration-in-open-state: ${CB_DEFAULT_WAIT_DURATION_IN_OPEN_STATE:15s}
        permitted-number-of-calls-in-half-open-state: ${CB_DEFAULT_PERMITTED_CALLS_IN_HALF_OPEN:5}
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
        ignore-exceptions:
          - com.pgcore.core.exception.BusinessException
    instances:
      cb-card-approve:
        base-config: default
      cb-card-cancel:
        base-config: default
        failure-rate-threshold: ${CB_CARD_CANCEL_FAILURE_RATE_THRESHOLD:60}
        wait-duration-in-open-state: ${CB_CARD_CANCEL_WAIT_DURATION_IN_OPEN_STATE:20s}
        permitted-number-of-calls-in-half-open-state: ${CB_CARD_CANCEL_PERMITTED_CALLS_IN_HALF_OPEN:3}
      cb-card-inquiry:
        base-config: default
        sliding-window-size: ${CB_CARD_INQUIRY_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${CB_CARD_INQUIRY_MINIMUM_NUMBER_OF_CALLS:5}
        failure-rate-threshold: ${CB_CARD_INQUIRY_FAILURE_RATE_THRESHOLD:70}
        wait-duration-in-open-state: ${CB_CARD_INQUIRY_WAIT_DURATION_IN_OPEN_STATE:30s}
      cb-sqs-outbox:
        base-config: default
        sliding-window-type: ${CB_SQS_OUTBOX_SLIDING_WINDOW_TYPE:TIME_BASED}
        sliding-window-size: ${CB_SQS_OUTBOX_SLIDING_WINDOW_SIZE:30}
      cb-redis:
        base-config: default
        sliding-window-size: ${CB_REDIS_SLIDING_WINDOW_SIZE:30}
        failure-rate-threshold: ${CB_REDIS_FAILURE_RATE_THRESHOLD:40}
        wait-duration-in-open-state: ${CB_REDIS_WAIT_DURATION_IN_OPEN_STATE:10s}
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - org.springframework.data.redis.RedisSystemException
          - io.lettuce.core.RedisConnectionException

  retry:
    instances:
      cb-card-approve:
        max-attempts: ${CB_CARD_APPROVE_RETRY_MAX_ATTEMPTS:1}
      cb-card-cancel:
        max-attempts: ${CB_CARD_CANCEL_RETRY_MAX_ATTEMPTS:2}
        wait-duration: ${CB_CARD_CANCEL_RETRY_WAIT_DURATION:500ms}
      cb-card-inquiry:
        max-attempts: ${CB_CARD_INQUIRY_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${CB_CARD_INQUIRY_RETRY_WAIT_DURATION:1s}

  bulkhead:
    instances:
      cb-card-approve:
        max-concurrent-calls: ${CB_CARD_APPROVE_BULKHEAD_MAX_CONCURRENT_CALLS:30}
        max-wait-duration: ${CB_CARD_APPROVE_BULKHEAD_MAX_WAIT_DURATION:500ms}
      cb-card-cancel:
        max-concurrent-calls: ${CB_CARD_CANCEL_BULKHEAD_MAX_CONCURRENT_CALLS:15}
        max-wait-duration: ${CB_CARD_CANCEL_BULKHEAD_MAX_WAIT_DURATION:500ms}
      cb-card-inquiry:
        max-concurrent-calls: ${CB_CARD_INQUIRY_BULKHEAD_MAX_CONCURRENT_CALLS:5}
        max-wait-duration: ${CB_CARD_INQUIRY_BULKHEAD_MAX_WAIT_DURATION:1s}
      cb-sqs-outbox:
        max-concurrent-calls: ${CB_SQS_OUTBOX_BULKHEAD_MAX_CONCURRENT_CALLS:10}
        max-wait-duration: ${CB_SQS_OUTBOX_BULKHEAD_MAX_WAIT_DURATION:500ms}
      cb-redis:
        max-concurrent-calls: ${CB_REDIS_BULKHEAD_MAX_CONCURRENT_CALLS:50}
        max-wait-duration: ${CB_REDIS_BULKHEAD_MAX_WAIT_DURATION:100ms}
aws:
  region: ${AWS_REGION}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
server:
  port: 8080
