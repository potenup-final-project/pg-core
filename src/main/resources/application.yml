spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/pgcore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: pgcore

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/pgcore
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

webhook:
  dispatcher:
    batch-size: ${DISPATCHER_BATCH_SIZE}
    interval-ms: ${DISPATCHER_INTERVAL_MS}
  secret:
    # AES-256-GCM key: base64(32 bytes). 반드시 WEBHOOK_SECRET_KEY 환경변수로 주입해야 함. 미설정 시 기동 실패.
    encryption-key: ${WEBHOOK_SECRET_KEY}
  endpoint:
    # 실서비스는 반드시 true. HTTP 허용이 필요한 경우(로컬 테스트)에만 false로 변경.
    require-https: ${WEBHOOK_REQUIRE_HTTPS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha

mock-card-server:
  url: http://localhost:8081

outbox:
  relay:
    enabled: ${OUTBOX_RELAY_ENABLED}
    publisher: ${OUTBOX_RELAY_PUBLISHER}
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE}
    interval-ms: ${OUTBOX_RELAY_INTERVAL_MS}
    lease-minutes: ${OUTBOX_RELAY_LEASE_MINUTES}
    lease-sweep-interval-ms: ${OUTBOX_RELAY_LEASE_SWEEP_INTERVAL_MS}
    max-retry: ${MAX_RETRY_WEBHOOK}
    sqs:
      queue-url: ${OUTBOX_RELAY_SQS_QUEUE_URL:}

aws:
  region: ${AWS_REGION}
