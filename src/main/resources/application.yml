spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/pgcore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: "@bangbang1"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: pgcore

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/pgcore
    username: root
    password: "@bangbang1"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

webhook:
  dispatcher:
    batch-size: 50
    interval-ms: 500
  limiter:
    type: local       # local | redis
    cache-name: webhook-endpoint-semaphores
    maximum-size: 100000
    expire-after-access-seconds: 3600
  worker:
    batch-size: 50
    interval-ms: 500
    max-attempts: 6
    concurrency-per-endpoint: 3
    send-threads: 10
  lease:
    minutes: 3
    sweep-interval-ms: 30000
  http:
    connect-timeout-ms: 10000
    read-timeout-ms: 3000
  secret:
    # AES-256-GCM key: base64(32 bytes). 반드시 WEBHOOK_SECRET_KEY 환경변수로 주입해야 함. 미설정 시 기동 실패.
    encryption-key: ${WEBHOOK_SECRET_KEY}
    # 마이그레이션 완료 후 반드시 false로 전환. true는 과도기 한정.
    allow-plaintext-fallback: false
  endpoint:
    # 실서비스는 반드시 true. HTTP 허용이 필요한 경우(로컬 테스트)에만 false로 변경.
    require-https: true
