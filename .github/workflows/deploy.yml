name: deploy.yml

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/reusable-build-and-push.yml
    with:
      image_name: potenup/pg-core
      platforms: linux/amd64
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Docker login
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Pull image
        run: docker pull potenup/pg-core:${{ needs.build.outputs.image_tag }}

      - name: Restart container
        run: |
          docker stop potenup || true
          docker rm potenup || true
          docker run -d \
            --name potenup \
            --env-file /home/ec2-user/app/pg-core.env \
            -p 8080:8080 \
            --restart always \
            potenup/pg-core:${{ needs.build.outputs.image_tag }}
