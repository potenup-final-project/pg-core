name: deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/reusable-build-and-push.yml
    with:
      image_name: potenup/pg-core
      platforms: linux/amd64
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: self-hosted
    environment: production

    steps:
      - name: Print image tag
        run: echo "Deploying image tag ${{ needs.build.outputs.image_tag }}"

      - name: Docker login
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Pull new image
        run: docker pull potenup/pg-core:${{ needs.build.outputs.image_tag }}

      - name: Stop and remove old container
        run: |
          docker stop pg-core || true
          docker rm pg-core || true

      - name: Run new container
        run: |
          docker run -d \
            --name pg-core \
            --env-file /home/ec2-user/app/pg-core.env \
            -p 8080:8080 \
            --restart always \
            potenup/pg-core:${{ needs.build.outputs.image_tag }}

      - name: Verify container running
        run: |
          sleep 5
          docker ps | grep pg-core

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Service is healthy"
              exit 0
            fi
            echo "Waiting for service..."
            sleep 5
          done
          echo "Service failed to start"
          docker logs pg-core
          exit 1
